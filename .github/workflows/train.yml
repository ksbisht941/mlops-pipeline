name: Train Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv sync

      - name: Pull data
        run: dvc pull

      - name: Run pipeline
        run: dvc repro

      - name: Push artifacts
        run: dvc push

      - name: Upload model
        run: echo "Model logged to MLflow"